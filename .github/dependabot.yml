---
version: 2
registries:
  github-coopnorge:
    type: git
    url: https://github.com
    username: x-access-token
    password: ${{secrets.DEPENDABOT_GHCR_PULL}}
  coop-ghcr:
    type: docker-registry
    url: ghcr.io
    username: CoopGithubServiceaccount
    password: ${{ secrets.DEPENDABOT_GHCR_PULL }}
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "daily"
    registries:
      - github-coopnorge
    cooldown:
      default-days: 7
      exclude:
        - github.com/coopnorge/*
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      exclude:
        - coopnorge/*
  - package-ecosystem: "docker"
    directory: "/devtools"
    registries:
      - coop-ghcr
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      exclude:
        - coopnorge/*
